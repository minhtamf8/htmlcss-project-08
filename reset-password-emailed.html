<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reset your password | Grocery Mart</title>

        <!-- favicon -->
        <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />

        <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
        <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
        <link rel="manifest" href="./assets/favicon/site.webmanifest" />

        <!-- font -->
        <link rel="stylesheet" href="./assets/fonts/stylesheet.css" />

        <!-- style -->
        <link rel="stylesheet" href="./assets/css/main.css" />

        <!-- scripts -->
        <script src="./assets/js/scripts.js"></script>
    </head>
    <body>
        <main class="auth">
            <!-- Auth intro -->
            <div class="auth__intro d-md-none">
                <img src="./assets/imgs/auth/forgot-password.png" alt="" class="auth__intro-img" />
            </div>

            <!-- Auth content -->
            <div class="auth__content">
                <div class="auth__content-inner">
                    <!-- logo -->
                    <a href="./" class="logo top-bar__logo">
                        <img
                            src="./assets/icons/logoshinrin.svg"
                            alt="ShinRin | Thức uống dinh dưỡng và tốt cho sức khỏe"
                            class="logo__img top-bar__logo-img"
                        />

                        <!-- cho screen reader -->
                        <span class="sr-only"> Thức uống dinh dưỡng và tốt cho sức khỏe </span>

                        <!-- hiển thị -->
                        <h1 class="logo__title top-bar__logo-title" aria-hidden="true">
                            <span>ShinRin</span>
                            <span>wellness</span>
                        </h1>
                    </a>
                    <h1 class="auth__heading">Forgot your password?</h1>
                    <p class="auth__desc">Enter your email and we'll send you a link to reset your password.</p>
                    <div class="auth__message message message--success">We have e-mailed your password reset link!</div>
                    <form action="./index-logined.html" class="form auth__form auth__form-forgot">
                        <div class="form__group">
                            <div class="form__text-input">
                                <input type="email" name="" id="" placeholder="Email" class="form__input" required />
                                <img src="./assets/icons/message.svg" alt="" class="form__input-icon" />
                                <img src="./assets/icons/form-error.svg" alt="" class="form__input-icon-error" />
                            </div>
                            <p class="form__error">
                                The email address you just entered is incorrect. Please check again.
                            </p>
                        </div>
                        <div class="form__group auth__btn-group">
                            <button class="btn btn--primary auth__btn form__submit-btn">Reset password</button>
                        </div>
                    </form>

                    <p class="auth__text">
                        <a href="./signin.html" class="auth__link auth__text-link">Back to Sign In</a>
                    </p>
                </div>
            </div>
        </main>
        <script>
            window.dispatchEvent(new Event("template-loaded"));
        </script>
    </body>
</html>
